name: Objavi Instagram Reel

# SVI termini su u UTC. Srbija je leti (CEST) UTC+2, zimi (CET) UTC+1.
# Ovaj raspored je napravljen za LETNJE vreme (trenutno vazi).
# Kad se pomeri na zimsko vreme (kraj oktobra), termini ce se pomeriti
# za 1h unazad po srpskom vremenu -- ako to smeta, javi Claude-u da ih
# prilagodi.
#
# JUTARNJI BLOK -- 06:00-11:42 po srpskom vremenu (20 objava, na 18 min)
# VECERNJI BLOK -- 17:00-23:39 po srpskom vremenu (20 objava, na 21 min)
on:
  schedule:
    # --- Jutro (06:00 - 11:42 po srpskom vremenu) ---
    - cron: "0 4 * * *"
    - cron: "18 4 * * *"
    - cron: "36 4 * * *"
    - cron: "54 4 * * *"
    - cron: "12 5 * * *"
    - cron: "30 5 * * *"
    - cron: "48 5 * * *"
    - cron: "6 6 * * *"
    - cron: "24 6 * * *"
    - cron: "42 6 * * *"
    - cron: "0 7 * * *"
    - cron: "18 7 * * *"
    - cron: "36 7 * * *"
    - cron: "54 7 * * *"
    - cron: "12 8 * * *"
    - cron: "30 8 * * *"
    - cron: "48 8 * * *"
    - cron: "6 9 * * *"
    - cron: "24 9 * * *"
    - cron: "42 9 * * *"
    # --- Vece (17:00 - 23:39 po srpskom vremenu) ---
    - cron: "0 15 * * *"
    - cron: "21 15 * * *"
    - cron: "42 15 * * *"
    - cron: "3 16 * * *"
    - cron: "24 16 * * *"
    - cron: "45 16 * * *"
    - cron: "6 17 * * *"
    - cron: "27 17 * * *"
    - cron: "48 17 * * *"
    - cron: "9 18 * * *"
    - cron: "30 18 * * *"
    - cron: "51 18 * * *"
    - cron: "12 19 * * *"
    - cron: "33 19 * * *"
    - cron: "54 19 * * *"
    - cron: "15 20 * * *"
    - cron: "36 20 * * *"
    - cron: "57 20 * * *"
    - cron: "18 21 * * *"
    - cron: "39 21 * * *"
  workflow_dispatch: {}  # dozvoljava i rucno pokretanje sa GitHub sajta, za testiranje

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Preuzmi repozitorijum
        uses: actions/checkout@v4

      - name: Podesi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaliraj ffmpeg i fontove
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Instaliraj biblioteke
        run: pip install -r requirements.txt

      - name: Objavi sledeci video
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python instagram_post.py

      - name: Sacuvaj napredak (state.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update posting state [skip ci]" || echo "Nema promena"
          git push
