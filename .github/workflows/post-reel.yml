name: Objavi Instagram Reel

# SVI termini su u UTC. Srbija je leti (CEST) UTC+2, zimi (CET) UTC+1.
# Ovaj raspored je napravljen za LETNJE vreme (trenutno vazi).
#
# Umesto pojedinacnih linija, koristimo standardni, kompaktan format:
# "svaki 18. minut, u ovom opsegu sati" -- GitHub ovo pouzdanije izvrsava.
#
# JUTARNJI BLOK: UTC 04:00-09:54 = srpsko vreme 06:00-11:54 (~24 objave)
# VECERNJI BLOK: UTC 16:00-21:54 = srpsko vreme 18:00-23:54 (~24 objave)

# Sprecava da se dva pokretanja izvrsavaju istovremeno -- cekaju red umesto
# da se sudare pri cuvanju state.json. Ovo takodje sprecava da se isti
# video slucajno objavi dvaput zaredom.
concurrency:
  group: post-reel
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/18 4-9 * * *"    # jutro: 06:00-11:54 po srpskom vremenu
    - cron: "*/18 16-21 * * *"  # vece: 18:00-23:54 po srpskom vremenu
  workflow_dispatch: {}  # dozvoljava i rucno pokretanje sa GitHub sajta, za testiranje

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Preuzmi repozitorijum
        uses: actions/checkout@v4

      - name: Podesi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaliraj ffmpeg i fontove
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Instaliraj biblioteke
        run: pip install -r requirements.txt

      - name: Objavi sledeci video
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python instagram_post.py

      - name: Sacuvaj napredak (state.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update posting state [skip ci]" || echo "Nema promena"
          git fetch origin main
          git rebase origin/main
          git push
