name: Objavi Instagram Reel

# SVI termini su u UTC. Srbija je leti (CEST) UTC+2, zimi (CET) UTC+1.
# Ovaj raspored je napravljen za LETNJE vreme (trenutno vazi).
#
# JUTARNJI BLOK: UTC 04:00-09:54 = srpsko vreme 06:00-11:54 (~24 objave)
# VECERNJI BLOK: UTC 16:00-21:54 = srpsko vreme 18:00-23:54 (~24 objave)
#
# NAPOMENA: ovaj raspored moze biti nepouzdan (GitHub dokumentovano kasni
# ili preskace zakazana pokretanja pod opterecenjem). Ako se koristi
# spoljasnji servis (npr. cron-job.org) koji direktno zove workflow_dispatch,
# skripta (instagram_post.py) sama proverava da li je "pravo vreme" preko
# ALLOWED_UTC_HOUR_WINDOWS i tiho preskace van tih sati -- pa je bezbedno
# da spoljasnji servis zove ovo i cesce/van ovih okvira.

on:
  schedule:
    - cron: "*/18 4-9 * * *"    # jutro: 06:00-11:54 po srpskom vremenu
    - cron: "*/18 16-21 * * *"  # vece: 18:00-23:54 po srpskom vremenu
  workflow_dispatch: {}  # dozvoljava i rucno/spoljasnje pokretanje

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Preuzmi repozitorijum
        uses: actions/checkout@v4

      - name: Podesi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instaliraj ffmpeg i fontove
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Instaliraj biblioteke
        run: pip install -r requirements.txt

      - name: Objavi sledeci video
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python instagram_post.py

      - name: Sacuvaj napredak (state.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update posting state [skip ci]" || echo "Nema promena"

          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main && git push && break
            echo "Push nije uspeo (pokusaj $i/5), pokusavam ponovo za 5s..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
